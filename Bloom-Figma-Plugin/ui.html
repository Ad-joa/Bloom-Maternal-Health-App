<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #FAFAFA; margin: 0; color: #333; }
  h2 { font-size: 14px; font-weight: 600; margin-top: 0; margin-bottom: 8px; }
  p { font-size: 12px; color: #666; margin-bottom: 16px; line-height: 1.4; }
  
  .section { background: white; padding: 12px; border-radius: 8px; border: 1px solid #E5E5E5; margin-bottom: 16px; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; font-weight: 600; }
  
  select { width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; background: #fff; }
  
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
  .toggle-row input { margin: 0; cursor: pointer; }
  
  button {
    background-color: #F97316; color: white; border: none; border-radius: 6px;
    padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    width: 100%; margin-bottom: 10px; transition: background-color 0.2s;
  }
  button:hover { background-color: #EA580C; }
  .secondary { background-color: #FEEBC8; color: #DD6B20; }
  .secondary:hover { background-color: #FBD38D; }
</style>
</head>
<body>
<h2>Bloom Awwwards Generator</h2>
<p>Generate highly detailed screens with advanced UI components.</p>

<div class="section">
  <div class="section-title">Design Engine</div>
  <button class="secondary" id="setup-styles">Initialize Bloom Tokens</button>
</div>

<div class="section">
  <div class="section-title">Screen Scaffold</div>
  <select id="screen-select">
    <option value="SplashScreen">Splash Screen</option>
    <option value="LandingScreen">Landing Screen</option>
    <option value="OnboardingScreen">Onboarding Screen</option>
    <option value="LoginScreen">Login Screen</option>
    <option value="RegisterScreen">Register Screen</option>
    <option value="HomeScreen" selected>Home Screen</option>
    <option value="InsightsScreen">Insights Screen</option>
    <option value="ChatsScreen">Chats Screen</option>
    <option value="TrackerScreen">Tracker Screen</option>
    <option value="SymptomCheckerScreen">Symptom Checker</option>
    <option value="DangerSignsScreen">Danger Signs</option>
    <option value="VisitsScreen">Visits Screen</option>
    <option value="TrimesterInfoScreen">Trimester Info</option>
    <option value="ProfileScreen">Profile Screen</option>
  </select>

  <div class="toggle-row">
    <label for="inc-nav">Include Bottom Nav Bar</label>
    <input type="checkbox" id="inc-nav" checked>
  </div>
  <div class="toggle-row">
    <label for="inc-appbar">Include Top App Bar</label>
    <input type="checkbox" id="inc-appbar" checked>
  </div>
</div>

<button id="generate-screen">Generate High-Fidelity Screen</button>

<script>
document.getElementById('setup-styles').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'setup-styles' } }, '*');
};

document.getElementById('generate-screen').onclick = () => {
  const screenType = document.getElementById('screen-select').value;
  const incNav = document.getElementById('inc-nav').checked;
  const incAppbar = document.getElementById('inc-appbar').checked;
  parent.postMessage({ pluginMessage: { type: 'generate-screen', screenType, incNav, incAppbar } }, '*');
};
</script>
</body>
</html>
