<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #FAFAFA; margin: 0; }
  h2 { font-size: 14px; font-weight: 600; color: #333; margin-top: 0; margin-bottom: 12px; }
  p { font-size: 12px; color: #666; margin-bottom: 16px; line-height: 1.4; }
  select { width: 100%; padding: 8px; margin-bottom: 16px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; }
  button {
    background-color: #F97316;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    transition: background-color 0.2s;
  }
  button:hover { background-color: #EA580C; }
  .secondary { background-color: #FEEBC8; color: #DD6B20; margin-top: 10px; }
  .secondary:hover { background-color: #FBD38D; }
</style>
</head>
<body>
<h2>Bloom Multi-Screen Generator</h2>
<p>Select a screen below to instantly generate a Flo-inspired scaffold on your canvas.</p>

<select id="screen-select">
  <option value="SplashScreen">Splash Screen</option>
  <option value="LandingScreen">Landing Screen</option>
  <option value="OnboardingScreen">Onboarding Screen</option>
  <option value="LoginScreen">Login Screen</option>
  <option value="RegisterScreen">Register Screen</option>
  <option value="HomeScreen" selected>Home Screen</option>
  <option value="SymptomCheckerScreen">Symptom Checker</option>
  <option value="DangerSignsScreen">Danger Signs</option>
  <option value="VisitsScreen">Visits Screen</option>
  <option value="TrimesterInfoScreen">Trimester Info</option>
  <option value="ProfileScreen">Profile Screen</option>
</select>

<button id="generate-screen">Generate Selected Screen</button>
<button class="secondary" id="setup-styles">Set Up Bloom Color Styles</button>

<script>
document.getElementById('setup-styles').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'setup-styles' } }, '*');
};

document.getElementById('generate-screen').onclick = () => {
  const select = document.getElementById('screen-select');
  const screenType = select.value;
  parent.postMessage({ pluginMessage: { type: 'generate-screen', screenType } }, '*');
};
</script>
</body>
</html>
