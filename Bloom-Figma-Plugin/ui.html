<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; padding: 20px; background-color: #FAFAFA; margin: 0; }
  h2 { font-size: 14px; font-weight: 600; color: #333; margin-top: 0; margin-bottom: 12px; }
  p { font-size: 12px; color: #666; margin-bottom: 20px; line-height: 1.4; }
  button {
    background-color: #F97316;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    transition: background-color 0.2s;
  }
  button:hover { background-color: #EA580C; }
  .secondary { background-color: #FEEBC8; color: #DD6B20; }
  .secondary:hover { background-color: #FBD38D; }
</style>
</head>
<body>
<h2>Bloom UI Tools</h2>
<p>Quickly scaffold Awwwards-level Bloom designs directly into your Figma canvas.</p>
<button id="setup-styles">Set Up Bloom Color Styles</button>
<button id="generate-home">Generate Home Screen Scaffold</button>
<button class="secondary" id="cancel">Cancel</button>

<script>
document.getElementById('setup-styles').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'setup-styles' } }, '*');
};
document.getElementById('generate-home').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'generate-home' } }, '*');
};
document.getElementById('cancel').onclick = () => {
  parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
};
</script>
</body>
</html>
